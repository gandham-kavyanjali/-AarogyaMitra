<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Reports</title>
<style>
body { font-family: 'Poppins', sans-serif; margin:0; padding:0; background:#f0f4f8; color:#333;}
header { background:#17a2b8; color:#fff; text-align:center; padding:20px; font-size:24px; font-weight:bold;}
.container { max-width:600px; margin:50px auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.2);}
input { width:100%; padding:10px; margin-bottom:15px; border-radius:6px; border:1px solid #ccc;}
button { padding:10px 15px; border:none; border-radius:6px; background:#17a2b8; color:#fff; cursor:pointer; margin-bottom:15px;}
button:hover { background:#138496;}
.file-item { display:flex; justify-content:space-between; align-items:center; margin:10px 0; padding:5px 10px; background:#e3f2fd; border-radius:5px; flex-wrap:wrap; }
.file-item span { flex:1; margin-right:10px; cursor:pointer; }
.file-item button { padding:3px 6px; font-size:12px; border-radius:4px; border:none; cursor:pointer; margin-left:5px;}
.remove-btn { background:red; color:white;}
.download-btn { background:green; color:white;}
a.back { display:block; margin-bottom:20px; color:#17a2b8; text-decoration:none; }
.preview { max-width:100px; max-height:100px; margin-right:10px; border-radius:6px; border:1px solid #ccc; cursor:pointer; }

/* Modal Styles */
.modal { display:none; position:fixed; z-index:1000; padding-top:50px; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.8);}
.modal-content { margin:auto; display:block; max-width:90%; max-height:90%; }
.modal-content iframe { width:100%; height:80vh; }
.close { position:absolute; top:20px; right:35px; color:#fff; font-size:40px; font-weight:bold; cursor:pointer; }
.close:hover { color:#bbb; }
</style>
</head>
<body>

<header>📑 Upload Reports</header>

<div class="container">
  <a href="dashboard.html" class="back">⬅️ Back to Dashboard</a>
  <input type="file" id="reportUpload" accept=".pdf,.jpg,.png,.jpeg,.docx">
  <button onclick="uploadReport()">Upload</button>
  <div id="uploadedFileName"></div>
</div>

<!-- Modal -->
<div id="previewModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <div id="modalContent"></div>
</div>

<script>
const uploadedFileName = document.getElementById('uploadedFileName');
const modal = document.getElementById('previewModal');
const modalContent = document.getElementById('modalContent');
let uploadedFiles = JSON.parse(localStorage.getItem('uploadedFiles') || '[]');

function renderUploadedFiles() {
  uploadedFileName.innerHTML = '';
  uploadedFiles.forEach((fileObj,index)=>{
    const fileDiv = document.createElement('div');
    fileDiv.className = 'file-item';

    let previewHTML = '';
    if(fileObj.name.match(/\.(jpg|jpeg|png)$/i)){
      previewHTML = `<img src="${fileObj.data}" class="preview" onclick="openModal(${index})">`;
    } else if(fileObj.name.match(/\.pdf$/i)){
      previewHTML = `<span onclick="openModal(${index})">📄 PDF</span>`;
    } else if(fileObj.name.match(/\.docx$/i)){
      previewHTML = `<span onclick="alert('Preview not available for DOCX')">📝 DOCX</span>`;
    } else {
      previewHTML = `<span>📁 File</span>`;
    }

    fileDiv.innerHTML = `
      <div class="file-info">${previewHTML}<span>${fileObj.name}</span></div>
      <div>
        <button class="download-btn" onclick="downloadFile(${index})">⬇️</button>
        <button class="remove-btn" onclick="removeFile(${index})">X</button>
      </div>
    `;
    uploadedFileName.appendChild(fileDiv);
  });
}

renderUploadedFiles();

function uploadReport() {
  const fileInput = document.getElementById('reportUpload');
  const file = fileInput.files[0];

  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      uploadedFiles.push({name:file.name, data:e.target.result});
      localStorage.setItem('uploadedFiles', JSON.stringify(uploadedFiles));
      renderUploadedFiles();
      fileInput.value = "";
    };
    reader.readAsDataURL(file);
  } else { alert("Please select a file first!"); }
}

function removeFile(index){
  uploadedFiles.splice(index,1);
  localStorage.setItem('uploadedFiles', JSON.stringify(uploadedFiles));
  renderUploadedFiles();
}

function downloadFile(index){
  const fileObj = uploadedFiles[index];
  const a = document.createElement('a');
  a.href = fileObj.data;
  a.download = fileObj.name;
  a.click();
}

// Open modal for image or PDF
function openModal(index){
  const fileObj = uploadedFiles[index];
  modal.style.display = "block";
  if(fileObj.name.match(/\.(jpg|jpeg|png)$/i)){
    modalContent.innerHTML = `<img src="${fileObj.data}" class="modal-content">`;
  } else if(fileObj.name.match(/\.pdf$/i)){
    modalContent.innerHTML = `<iframe src="${fileObj.data}"></iframe>`;
  } else {
    modalContent.innerHTML = `<p style="color:white; text-align:center;">Preview not available</p>`;
  }
}

function closeModal(){
  modal.style.display = "none";
  modalContent.innerHTML = '';
}

// Close modal when clicking outside content
window.onclick = function(event){
  if(event.target == modal){ closeModal(); }
}
</script>

</body>
</html>
