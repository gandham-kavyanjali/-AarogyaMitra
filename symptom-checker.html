<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symptom Checker</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: url('https://wallpapers.com/images/featured/medical-background-cjge7e89adg6ub8x.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #333;
}
header { 
    background-color: #17a2b8; 
    color: white; 
    padding: 15px; 
    font-size: 20px; 
    font-weight: bold; 
    text-align: center; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
.container { 
    max-width: 500px; 
    margin: 30px auto; 
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(220,240,255,0.95)); 
    animation: gradientShift 15s ease infinite; 
    background-size: 400% 400%; 
    padding: 20px; 
    border-radius: 12px; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
    text-align: center; 
    position: relative; 
    transition: transform 0.3s;
}
@keyframes gradientShift {0% {background-position:0% 50%;} 50% {background-position:100% 50%;} 100% {background-position:0% 50%;}}
.container img { width: 80px; margin-bottom: 15px; }

.input-group {
    display: flex;
    align-items: center;
    position: relative;
}
.input-group input { 
    flex: 1;
    padding: 10px 45px 10px 12px; 
    margin: 8px 0; 
    border-radius: 8px; 
    font-size: 14px; 
    border: 1px solid #ccc; 
    transition: 0.3s;
}
.input-group input:focus { border: 2px solid #17a2b8; outline: none; }

.mic-btn {
    background: transparent;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    position: absolute;
    right: 8px;
    top: 60%; /* slightly down */
    transform: translateY(-50%);
}
.mic-btn:hover { background: rgba(23,162,184,0.1); } .mic-btn.listening { background: rgba(255,0,0,0.2); }

.mic-btn img {
    width: 18px;
    height: 18px;
}

button.check-btn, button.back-btn { 
    color: white; 
    font-weight: bold; 
    border: none; 
    cursor: pointer; 
    transition: 0.3s; 
    padding: 10px; 
    border-radius: 8px; 
    width: 100%; 
    font-size: 14px; 
    margin-top: 8px; 
    background-color: #17a2b8; 
}
button.check-btn:hover, button.back-btn:hover { transform: scale(1.05); }

.result-card {
    background: linear-gradient(135deg, #17a2b8, #6fc3df);
    color: white;
    padding: 20px;
    border-radius: 12px;
    margin-top: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s forwards;
    text-align: left;
}
.result-card h3 { margin-top: 0; margin-bottom: 8px; font-size: 16px; }
.result-card p { margin-bottom: 6px; font-size: 14px; }

.video-btn {
    background: rgba(255,255,255,0.3);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    margin-top: 8px;
    cursor: pointer;
    width: 100%;
    font-weight: bold;
    transition: 0.3s;
}
.video-btn:hover { background: rgba(255,255,255,0.5); }

.daily-tip {
    margin-top: 15px; 
    background: #17a2b8; 
    color: white; 
    padding: 12px; 
    border-radius: 8px; 
    font-weight: bold; 
    cursor: pointer; 
    transition: transform 0.3s, background 0.3s; 
    font-size: 13px;
}
.daily-tip:hover { transform: scale(1.05); }

footer { text-align:center; margin-top:20px; color:white; font-size:12px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 768px) { .container { margin: 15px; padding: 15px; } }

/* small style for language selector area (non-invasive) */
.lang-area { text-align: right; padding: 8px 12px 0 12px; }
.lang-area select { padding:6px 8px; border-radius:6px; border:1px solid #ccc; }
</style>

// ------------------------- MIC / Speech Recognition (unchanged) -------------------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    const micBtn = document.getElementById("micBtn");
    const inputBox = document.getElementById("symptomInput");

    micBtn.addEventListener("click", () => {
        try {
          recognition.start();
          micBtn.classList.add("listening");
        } catch(err){
          console.warn("Recognition start error:", err);
        }
    });

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        inputBox.value = transcript;
    };

    recognition.onspeechend = () => {
        recognition.stop();
        micBtn.classList.remove("listening");
    };

    recognition.onerror = (event) => {
        console.error("Speech recognition error:", event.error);
        micBtn.classList.remove("listening");
        alert(translations[currentLang].speechError);
    };
} else {
    // If not supported, do not break page - just notify user in their language
    // we will show alert in default language
    // do nothing here; the first attempt will show alert through recognition.onerror fallback if used
}

// ------------------------- DAILY TIPS (translated per language) -------------------------
let tipIndex = Math.floor(Math.random() * translations.en.dailyTips.length);
const dailyTipEl = document.getElementById("dailyTip");
function showDailyTip() {
  const tips = translations[currentLang].dailyTips || translations.en.dailyTips;
  if(tips && tips.length>0){
    dailyTipEl.innerText = tips[tipIndex % tips.length];
  }
}
showDailyTip();
setInterval(() => { tipIndex = (tipIndex + 1); showDailyTip(); }, 5000);
dailyTipEl.onclick = () => { tipIndex = (tipIndex + 1); showDailyTip(); };

// ------------------------- SYMPTOM CHECK (uses diseaseData but renders translations) -------------------------
function checkSymptoms() {
    const input = document.getElementById("symptomInput").value.toLowerCase();
    if(!input || input.trim().length === 0){
      // nothing entered - you can decide to show a message; we keep same behavior as before
      return;
    }

    // try to match keywords (keeps original logic but also checks substring to be robust)
    const inputSymptoms = input.split(/,|\s+/).map(s => s.trim()).filter(Boolean);
    let matched = [];

    diseaseData.forEach(disease => {
        // original-style exact token match OR substring match for multi-word keywords
        const matches = disease.keywords.filter(k => {
            const kLower = k.toLowerCase();
            return inputSymptoms.includes(kLower) || input.includes(kLower);
        });
        if(matches.length > 0){
            matched.push(disease.name);
        }
    });

    // render based on matches
    if(matched.length > 0){
        renderResults(matched);
        lastMatchedNames = matched.slice(); // copy
    } else {
        renderUnknown();
        lastMatchedNames = null;
    }

    document.getElementById("backBtn").style.display = "block";
}

function renderResults(matchedNames){
    let resultHTML = "";
    matchedNames.forEach(name => {
        const disease = diseaseData.find(d => d.name === name);
        if(!disease) return;
        // get translations if available
        let dName = disease.name;
        let dInfo = disease.info;
        let dRemedies = disease.remedies;
        if(translations[currentLang] && translations[currentLang].diseases && translations[currentLang].diseases[disease.name]){
            const td = translations[currentLang].diseases[disease.name];
            if(td.name) dName = td.name;
            if(td.info) dInfo = td.info;
            if(td.remedies) dRemedies = td.remedies;
        }
        // build card HTML (video button label translated)
        const videoPart = disease.video ? `<button class="video-btn" onclick="window.open('${disease.video}','_blank')">${translations[currentLang].watchVideo}</button>` : "";
        resultHTML += `
            <div class="result-card">
                <h3>🧾 ${dName} ${disease.emoji}</h3>
                <p><strong>ℹ️ ${ translations[currentLang].instruction.includes("Symptoms") ? "Information" : "Information" }:</strong> ${dInfo}</p>
                <p><strong>💡 Remedies:</strong><br>${dRemedies}</p>
                ${videoPart}
            </div>`;
    });

    const resultBox = document.getElementById("resultBox");
    resultBox.innerHTML = resultHTML;
    resultBox.style.opacity = 0;
    void resultBox.offsetWidth;
    resultBox.style.animation = "fadeIn 0.8s forwards";
}

function renderUnknown(){
    const resultBox = document.getElementById("resultBox");
    resultBox.innerHTML = `
    <div class="result-card">
        <h3>${translations[currentLang].unknownTitle}</h3>
        <p>${translations[currentLang].unknownMsg}</p>
        <p>${translations[currentLang].consult}</p>
    </div>`;
    resultBox.style.opacity = 0;
    void resultBox.offsetWidth;
    resultBox.style.animation = "fadeIn 0.8s forwards";
}

function resetInput() {
    document.getElementById("symptomInput").value = "";
    document.getElementById("resultBox").innerHTML = "";
    document.getElementById("backBtn").style.display = "none";
    lastMatchedNames = null;
}

// ------------------------- LANGUAGE SWITCHING (non-invasive) -------------------------
function applyStaticTranslations(lang){
  currentLang = lang;
  // static UI bits
  document.getElementById("title").innerText = translations[lang].title;
  document.getElementById("instruction").innerText = translations[lang].instruction;
  document.getElementById("symptomInput").placeholder = translations[lang].placeholder;
  document.getElementById("checkBtn").innerText = translations[lang].check;
  document.getElementById("backBtn").innerText = translations[lang].back;
  // mic alt
  const micIcon = document.getElementById("micIcon");
  if(micIcon) micIcon.alt = translations[lang].micAlt;
  // footer (update text only - footer element is at bottom)
  const footerEl = document.querySelector('footer');
  if(footerEl) footerEl.innerText = translations[lang].footer;
  // daily tip update
  showDailyTip();
  // re-render any existing results in selected language
  if(lastMatchedNames && lastMatchedNames.length>0){
    renderResults(lastMatchedNames);
  } else if(document.getElementById("resultBox").innerHTML && (!lastMatchedNames || lastMatchedNames.length === 0)){
    // If unknown previously shown, re-render unknown in new language
    // We check content existence - safe fallback
    renderUnknown();
  }
}

// Listen for change
document.getElementById("languageSwitcher").addEventListener("change",(e) => {
  const lang = e.target.value;
  applyStaticTranslations(lang);
  try { localStorage.setItem('symptom-lang', lang); } catch(e){}
});

// on page load, set language from storage or default
document.addEventListener('DOMContentLoaded', () => {
  try {
    const saved = localStorage.getItem('symptom-lang');
    if(saved && translations[saved]) {
      document.getElementById("languageSwitcher").value = saved;
      applyStaticTranslations(saved);
    } else {
      applyStaticTranslations(currentLang);
    }
  } catch(e) {
    applyStaticTranslations(currentLang);
  }
});
</script>
